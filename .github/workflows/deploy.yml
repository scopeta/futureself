name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (default: git SHA)"
        required: false
        default: ""
      futureself_model:
        description: "Model deployment name in Foundry (e.g. claude-opus-4-6, gpt-4o)"
        required: true

env:
  ACR_NAME: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: futureself

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t $ACR_NAME/$IMAGE_NAME:${{ steps.tag.outputs.tag }} .
          docker push $ACR_NAME/$IMAGE_NAME:${{ steps.tag.outputs.tag }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        run: |
          az extension add --name containerapp --upgrade -y

          # Delete app if it exists (clean slate avoids stuck Failed state)
          if az containerapp show --name futureself --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} &>/dev/null; then
            az containerapp delete --name futureself --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --yes
          fi

          # Recreate environment in southeastasia if not already there
          ENV_LOCATION=$(az containerapp env show --name futureself-env --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query location -o tsv 2>/dev/null || echo "")
          if [ "$ENV_LOCATION" != "Southeast Asia" ]; then
            az containerapp env delete --name futureself-env --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --yes 2>/dev/null || true
            az containerapp env create --name futureself-env --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --location southeastasia
          fi

          az containerapp create \
            --name futureself \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --environment futureself-env \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 8000 \
            --ingress external \
            --env-vars \
              FUTURESELF_MODEL="${{ github.event.inputs.futureself_model }}" \
              ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              AZURE_FOUNDRY_ENDPOINT="${{ secrets.AZURE_FOUNDRY_ENDPOINT }}" \
              APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}"
