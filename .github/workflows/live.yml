name: Live Eval Gate

# Evaluator-as-reviewer: runs the agent against scenarios/*.yaml and applies
# deterministic assertions (hard) + LLM-as-judge (advisory floor). Costs real
# Anthropic tokens, so it is manual-dispatch only. To run it as a nightly gate,
# uncomment the `schedule` block below.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 * * 1"   # Mondays 06:00 UTC

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev --prerelease=allow

      - name: Run live eval (assertions + LLM-as-judge)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FUTURESELF_MODEL: ${{ vars.FUTURESELF_MODEL || 'claude-opus-4-8' }}
          JUDGE_MODEL: ${{ vars.JUDGE_MODEL || 'claude-opus-4-8' }}
          JUDGE_FLOOR: ${{ vars.JUDGE_FLOOR || '3' }}
        run: uv run --prerelease=allow pytest tests/scenarios/ -m live -v
