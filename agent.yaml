# Foundry Hosted Agent manifest (azd ai agent — flat schema).
# Anthropic-direct: the agent calls Claude via ANTHROPIC_API_KEY; Foundry hosts it
# and manages thread memory. FOUNDRY_PROJECT_ENDPOINT is injected by the platform.
# Container image + cpu/memory are configured in azure.yaml (Dockerfile.agent).
kind: hosted
name: futureself
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "0.5"
  memory: 1Gi
environment_variables:
  - name: FUTURESELF_MODEL
    value: claude-opus-4-8
  # Empty → Anthropic-direct chat client. Do NOT set for Foundry-direct.
  - name: AZURE_FOUNDRY_ENDPOINT
    value: ""
  # Injected from the azd environment at deploy (azd env set ANTHROPIC_API_KEY ...).
  - name: ANTHROPIC_API_KEY
    value: "${ANTHROPIC_API_KEY}"
  - name: DEFAULT_FETCH_HISTORY_ITEM_COUNT
    value: "20"
