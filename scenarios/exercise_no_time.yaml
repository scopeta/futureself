name: exercise_no_time
description: >
  User is a parent who says they have no time for exercise.
  Tests that the agent finds practical solutions across physical health
  and time management without manufacturing unnecessary tension.

user_blueprint:
  bio:
    age: 38
    conditions: []
  psych:
    goals: ["be healthy for my kids", "feel energetic"]
    stress_level: medium
  context:
    occupation: teacher
    income_usd_annual: 55000
    family_situation: married with two young children (ages 3 and 6)
    lifestyle_notes:
      - "2 hours of TV most evenings"
      - "commutes 30 min each way"

turns:
  - user_message: >
      I know I should exercise more but I genuinely have no time.
      Every minute is accounted for between work, the kids, and the house.
