name: motorcycle_purchase
description: >
  User wants to buy a motorcycle for freedom and community.
  Expected conflict: Physical Health (injury risk) vs Mental Health
  (autonomy, joy, social connection) vs Financial (insurance, depreciation).
  Tests the full critique-round pipeline with a 3-way conflict.

user_blueprint:
  bio:
    age: 34
    conditions: []
  psych:
    goals: ["adventure", "community", "fun"]
    stress_level: medium
  context:
    occupation: software engineer
    income_usd_annual: 95000
    family_situation: married, no children

turns:
  - user_message: >
      I've been thinking about buying a motorcycle. I want the freedom,
      and there's a great riding club near me. Is this a good idea?
    expected_agents_consulted:
      - physical_health
      - mental_health
      - financial
    expect_conflict: true
    conflict_area: injury risk vs autonomy and community
