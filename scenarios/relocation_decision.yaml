name: relocation_decision
description: >
  User lives in a high-pollution city with strong family ties. Asks about
  relocating. Tests multi-domain reasoning across geopolitics (PM2.5, healthcare
  access), social relations (family network), and financial (cost of living delta).

user_blueprint:
  bio:
    age: 42
    conditions: ["mild asthma"]
  psych:
    goals: ["longevity", "family closeness"]
    stress_level: medium
  context:
    location_city: Delhi
    location_country: India
    occupation: product manager
    income_usd_annual: 45000
    family_situation: married with two children, extended family nearby

turns:
  - user_message: >
      I've been reading about how bad the air pollution is here. The PM2.5
      is off the charts in winter. Should I seriously think about moving?
      My whole family is here though.
