{% extends "base.html" %}
{% block title %}FutureSelf — Chat{% endblock %}

{% block content %}
<div class="chat-container">
    <header>
        <h2>Your Future Self</h2>
    </header>

    <div id="chat-history" class="chat-history">
        {% for turn in history %}
        <div class="message {{ turn.role }}">
            <div class="message-content">{{ turn.content }}</div>
        </div>
        {% endfor %}
    </div>

    <form
        hx-post="/chat/send"
        hx-target="#chat-history"
        hx-swap="beforeend"
        hx-indicator="#chat-loading"
        hx-on::after-request="this.reset(); document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;"
        hx-disabled-elt="button[type='submit']"
    >
        <div class="chat-input">
            <textarea
                name="message"
                rows="2"
                placeholder="Talk to your future self..."
                required
                autofocus
            ></textarea>
            <button type="submit">Send</button>
        </div>
    </form>

    <div id="chat-loading" class="htmx-indicator">
        <p aria-busy="true">Your future self is thinking...</p>
    </div>
</div>
{% endblock %}
