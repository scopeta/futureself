{% extends "base.html" %}
{% block title %}FutureSelf — Your World{% endblock %}

{% block content %}
<article>
    <header>
        <h2>Tell Me About Your World</h2>
        <p>This helps your future self understand what matters to you right now.</p>
    </header>

    <form method="post" action="/onboard/complete">
        <!-- Step 1 data carried forward -->
        <input type="hidden" name="age" value="{{ age }}">
        <input type="hidden" name="sex" value="{{ sex }}">
        <input type="hidden" name="height_cm" value="{{ height_cm }}">
        <input type="hidden" name="weight_kg" value="{{ weight_kg }}">

        <label>
            Goals <small>comma-separated</small>
            <textarea name="goals" rows="2" placeholder="e.g. run a marathon, sleep better, save more money"></textarea>
        </label>

        <fieldset>
            <legend>Current stress level</legend>
            <label><input type="radio" name="stress_level" value="low"> Low</label>
            <label><input type="radio" name="stress_level" value="medium" checked> Medium</label>
            <label><input type="radio" name="stress_level" value="high"> High</label>
        </fieldset>

        <div class="grid">
            <label>
                City
                <input type="text" name="location_city" placeholder="e.g. London">
            </label>
            <label>
                Country
                <input type="text" name="location_country" placeholder="e.g. United Kingdom">
            </label>
        </div>

        <label>
            Occupation
            <input type="text" name="occupation" placeholder="e.g. software engineer">
        </label>

        <button type="submit">Start Conversation</button>
    </form>
</article>
{% endblock %}
